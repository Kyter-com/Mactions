<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Mactions dashboard preview</title>
  <desc id="desc">A stylized Mactions dashboard showing queued jobs becoming one-job macOS, Linux, and Windows runners.</desc>
  <defs>
    <linearGradient id="page" x1="90" y1="28" x2="1168" y2="704" gradientUnits="userSpaceOnUse">
      <stop stop-color="#151820"/>
      <stop offset="0.52" stop-color="#20232A"/>
      <stop offset="1" stop-color="#11151D"/>
    </linearGradient>
    <linearGradient id="panel" x1="150" y1="104" x2="850" y2="635" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFF" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#DCE6FF" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="logo-bg" x1="116" y1="88" x2="116" y2="148" gradientUnits="userSpaceOnUse">
      <stop stop-color="#242832"/>
      <stop offset="1" stop-color="#3A3D44"/>
    </linearGradient>
    <linearGradient id="logo-glyph" x1="96" y1="98" x2="138" y2="140" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.86"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.52"/>
    </linearGradient>
    <filter id="shadow" x="56" y="40" width="1168" height="636" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="28" stdDeviation="36" flood-color="#000000" flood-opacity="0.36"/>
    </filter>
    <filter id="soft" x="0" y="0" width="1280" height="720" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="70"/>
    </filter>
    <clipPath id="window-clip">
      <rect x="78" y="64" width="1124" height="592" rx="30"/>
    </clipPath>
  </defs>

  <rect width="1280" height="720" fill="url(#page)"/>
