name: Self-hosted smoke (Mactions runner)

# Manual-only: a tiny job that runs on a runner provided by Mactions itself
# (runs-on matches the app's default labels). Proves the ephemeral loop end to
# end — and gives Mactions a working macOS build/test path while the hosted
# macos-latest runners are unavailable to the org. Dispatch with:
#   gh workflow run "Self-hosted smoke (Mactions runner)"
on:
  # workflow_dispatch ONLY — never add pull_request / pull_request_target / push.
  # This job runs on a SELF-HOSTED runner (the maintainer's Mac, no VM isolation);
  # a fork-PR trigger would let untrusted code execute on that host. Dispatch
  # requires repo write access, which keeps the self-hosted runner closed to
  # outside contributors.
  workflow_dispatch:

# Least privilege: this job checks out the repo (actions/checkout) and then
# builds/tests, so the GITHUB_TOKEN needs read access to contents and nothing
# else.
permissions:
  contents: read

jobs:
  smoke:
    runs-on: [self-hosted, macOS, mactions]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Swift version
        run: swift --version
      - name: Build
        run: swift build
      - name: Test
        run: swift test
