name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Build + unit tests. macOS-only: this is a macOS app, and MactionsCore's
  # tests are pure Foundation (no network), so they run anywhere macOS does.
  # If GitHub-hosted macOS runners are unavailable to the org, point this at a
  # self-hosted Mac instead (runs-on: [self-hosted, macOS]) — which is, after
  # all, exactly what this app exists to provide.
  build-test:
    name: build + test
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Swift version
        run: swift --version
      - name: Build
        run: swift build
      - name: Test
        run: swift test
