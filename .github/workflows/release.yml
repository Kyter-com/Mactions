name: Self-hosted macOS release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, with or without the leading v"
        required: true
        type: string

concurrency:
  group: self-hosted-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  APP_NAME: Mactions
  SCHEME: MactionsApp
  # Opt into Homebrew's upcoming tap-trust default early. We only install the
  # core formula `xcodegen`, so enforcing trust changes nothing for us.
  HOMEBREW_REQUIRE_TAP_TRUST: "1"

jobs:
  release:
    name: Build, notarize, and publish
    runs-on: [self-hosted, macOS, mactions]
    environment: release
    timeout-minutes: 60
    env:
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
      SPARKLE_PUBLIC_ED_KEY: ${{ vars.SPARKLE_PUBLIC_ED_KEY }}
      VERSION_INPUT: ${{ github.event.inputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Add Homebrew to PATH
        run: |
          {
            echo "/opt/homebrew/bin"
            echo "/opt/homebrew/sbin"
            echo "/usr/local/bin"
          } >> "$GITHUB_PATH"

      - name: Derive release version
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            TAG="$GITHUB_REF_NAME"
          else
            if [ -z "${VERSION_INPUT:-}" ]; then
              echo "::error::workflow_dispatch requires a version input"
              exit 1
            fi
            TAG="v${VERSION_INPUT#v}"
          fi

          VERSION="${TAG#v}"
          if ! [[ "$VERSION" =~ ^[0-9]+(\.[0-9]+){1,2}$ ]]; then
            echo "::error::Release version must look like 0.1 or 0.1.0; got '$VERSION'"
            exit 1
          fi

          echo "TAG=$TAG" >> "$GITHUB_ENV"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "BUILD_NUMBER=$GITHUB_RUN_NUMBER" >> "$GITHUB_ENV"

      - name: Require signing, notarization, and Sparkle inputs
        run: |
          set -euo pipefail
          missing=()
          for name in CSC_LINK CSC_KEY_PASSWORD APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID SPARKLE_PRIVATE_KEY; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done
          if [ -z "${SPARKLE_PUBLIC_ED_KEY:-}" ]; then
            missing+=("vars.SPARKLE_PUBLIC_ED_KEY")
          fi
          if [ "${#missing[@]}" -gt 0 ]; then
            printf '::error::Missing required release inputs: %s\n' "${missing[*]}"
            exit 1
          fi

      - name: Select Xcode 26
        run: |
          set -euo pipefail

          shopt -s nullglob
          xcode_26_apps=(/Applications/Xcode_26*.app)
          shopt -u nullglob

          candidates=()
          for ((idx=${#xcode_26_apps[@]} - 1; idx >= 0; idx--)); do
            candidates+=("${xcode_26_apps[$idx]}")
          done
          candidates+=("/Applications/Xcode.app")

          developer_dir=""
          for app in "${candidates[@]}"; do
            developer="$app/Contents/Developer"
            if [ ! -d "$developer" ]; then
              continue
            fi

            version_output="$($developer/usr/bin/xcodebuild -version)"
            version_line="${version_output%%$'\n'*}"
            if [[ "$version_line" =~ ^Xcode[[:space:]]26([.]|$) ]]; then
              developer_dir="$developer"
              break
            fi
          done

          if [ -z "$developer_dir" ]; then
            echo "::error::No Xcode 26 installation found on this runner"
            exit 1
          fi

          export DEVELOPER_DIR="$developer_dir"
          echo "DEVELOPER_DIR=$developer_dir" >> "$GITHUB_ENV"
          xcodebuild -version
          swift --version

      - name: Install XcodeGen
        run: |
          set -euo pipefail
          if ! command -v xcodegen >/dev/null 2>&1; then
            if ! command -v brew >/dev/null 2>&1; then
              echo "::error::Homebrew is required to install xcodegen on this self-hosted runner"
              exit 1
            fi
            brew install xcodegen
          fi
          xcodegen --version

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Run Swift tests
        run: swift test

      - name: Import Developer ID certificate
        run: |
          set -euo pipefail
          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"

          if ! printf '%s' "$CSC_LINK" | base64 --decode > "$CERTIFICATE_PATH" 2>/dev/null; then
            printf '%s' "$CSC_LINK" | base64 -D > "$CERTIFICATE_PATH"
          fi

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$CSC_KEY_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -T /usr/bin/productsign
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -d user -s "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Resolve Xcode package dependencies
        run: |
          set -euo pipefail
          SOURCE_PACKAGES="$RUNNER_TEMP/SourcePackages"
          xcodebuild -resolvePackageDependencies \
            -project Mactions.xcodeproj \
            -scheme "$SCHEME" \
            -clonedSourcePackagesDirPath "$SOURCE_PACKAGES"
          echo "SOURCE_PACKAGES=$SOURCE_PACKAGES" >> "$GITHUB_ENV"

      - name: Archive app
        run: |
          set -euo pipefail
          ARCHIVE_PATH="$RUNNER_TEMP/$APP_NAME.xcarchive"
          DERIVED_DATA="$RUNNER_TEMP/DerivedData"

          xcodebuild clean archive \
            -project Mactions.xcodeproj \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination "generic/platform=macOS" \
            -archivePath "$ARCHIVE_PATH" \
            -derivedDataPath "$DERIVED_DATA" \
            -clonedSourcePackagesDirPath "$SOURCE_PACKAGES" \
            MARKETING_VERSION="$VERSION" \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            ENABLE_HARDENED_RUNTIME=YES \
            ONLY_ACTIVE_ARCH=NO \
            SPARKLE_PUBLIC_ED_KEY="$SPARKLE_PUBLIC_ED_KEY"

          echo "ARCHIVE_PATH=$ARCHIVE_PATH" >> "$GITHUB_ENV"

      - name: Export Developer ID app
        run: |
          set -euo pipefail
          EXPORT_PATH="$RUNNER_TEMP/export"
          EXPORT_OPTIONS="$RUNNER_TEMP/ExportOptions.plist"

          cat > "$EXPORT_OPTIONS" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>developer-id</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>$APPLE_TEAM_ID</string>
            <key>stripSwiftSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist "$EXPORT_OPTIONS"

          APP_PATH="$EXPORT_PATH/$APP_NAME.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "::error::Export did not produce $APP_PATH"
            exit 1
          fi

          echo "APP_PATH=$APP_PATH" >> "$GITHUB_ENV"

      - name: Notarize and staple app
        run: |
          set -euo pipefail
          APP_ZIP="$RUNNER_TEMP/$APP_NAME-app-for-notary.zip"
          ditto -c -k --keepParent "$APP_PATH" "$APP_ZIP"

          xcrun notarytool submit "$APP_ZIP" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          xcrun stapler staple "$APP_PATH"
          xcrun stapler validate "$APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          spctl -a -vvv -t exec "$APP_PATH"
          lipo -archs "$APP_PATH/Contents/MacOS/$APP_NAME"

      - name: Package DMG and ZIP
        run: |
          set -euo pipefail
          DIST="$GITHUB_WORKSPACE/dist"
          DMG_ROOT="$RUNNER_TEMP/dmg-root"
          DMG_PATH="$DIST/$APP_NAME-$VERSION.dmg"
          ZIP_PATH="$DIST/$APP_NAME-$VERSION.zip"

          mkdir -p "$DIST" "$DMG_ROOT"
          cp -R "$APP_PATH" "$DMG_ROOT/$APP_NAME.app"
          ln -s /Applications "$DMG_ROOT/Applications"

          hdiutil create \
            -volname "$APP_NAME" \
            -srcfolder "$DMG_ROOT" \
            -ov \
            -format UDZO \
            "$DMG_PATH"
          codesign --force --sign "Developer ID Application" --timestamp "$DMG_PATH"

          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "$DMG_PATH"
          xcrun stapler validate "$DMG_PATH"
          spctl -a -vvv -t install "$DMG_PATH"

          ditto -c -k --keepParent "$APP_PATH" "$ZIP_PATH"

          echo "DIST=$DIST" >> "$GITHUB_ENV"
          echo "DMG_PATH=$DMG_PATH" >> "$GITHUB_ENV"
          echo "ZIP_PATH=$ZIP_PATH" >> "$GITHUB_ENV"

      - name: Generate Sparkle appcast
        run: |
          set -euo pipefail
          GENERATE_APPCAST="$(find "$SOURCE_PACKAGES/artifacts" -path '*/Sparkle/bin/generate_appcast' -print -quit)"
          if [ -z "$GENERATE_APPCAST" ]; then
            echo "::error::Sparkle generate_appcast was not found under $SOURCE_PACKAGES/artifacts"
            exit 1
          fi

          APPCAST_DIR="$RUNNER_TEMP/appcast"
          NOTES_FILE="$APP_NAME-$VERSION.md"
          mkdir -p "$APPCAST_DIR"
          cp "$DMG_PATH" "$APPCAST_DIR/"
          printf 'See the GitHub release: https://github.com/%s/releases/tag/%s\n' "$GITHUB_REPOSITORY" "$TAG" > "$APPCAST_DIR/$NOTES_FILE"

          printf '%s' "$SPARKLE_PRIVATE_KEY" | "$GENERATE_APPCAST" \
            --ed-key-file - \
            --download-url-prefix "https://github.com/$GITHUB_REPOSITORY/releases/download/$TAG/" \
            --release-notes-url-prefix "https://github.com/$GITHUB_REPOSITORY/releases/download/$TAG/" \
            "$APPCAST_DIR"

          cp "$APPCAST_DIR/appcast.xml" "$DIST/appcast.xml"
          cp "$APPCAST_DIR/$NOTES_FILE" "$DIST/$NOTES_FILE"
          echo "NOTES_FILE=$NOTES_FILE" >> "$GITHUB_ENV"

      - name: Write checksums
        run: |
          set -euo pipefail
          cd "$DIST"
          shasum -a 256 "$(basename "$DMG_PATH")" "$(basename "$ZIP_PATH")" appcast.xml "$NOTES_FILE" > checksums.txt

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          assets=(
            "$DMG_PATH"
            "$ZIP_PATH"
            "$DIST/appcast.xml"
            "$DIST/$NOTES_FILE"
            "$DIST/checksums.txt"
          )

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "${assets[@]}" --clobber
          else
            gh release create "$TAG" "${assets[@]}" \
              --target "$GITHUB_SHA" \
              --title "$APP_NAME $VERSION" \
              --generate-notes
          fi

      - name: Remove temporary keychain
        if: always()
        run: |
          if [ -n "${KEYCHAIN_PATH:-}" ]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi
